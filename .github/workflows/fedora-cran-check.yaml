name: Fedora CRAN check

# Mirrors the CRAN r-devel-linux-x86_64-fedora-gcc flavour by running
# `R CMD build && R CMD check --as-cran` inside the rhub gcc16 container
# (Fedora 44 + GCC 16 + the same R-devel snapshot CRAN uses). Same image
# scripts/docker-cran-fedora.sh runs locally.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fedora-cran-check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/r-hub/containers/gcc16:latest
    env:
      R_LIBS_USER: /root/R-libs

    steps:
      - uses: actions/checkout@v4

      - name: Install OS dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            zlib-devel libuv-devel libxml2-devel libicu-devel \
            pandoc qpdf texlive-scheme-medium

      - name: Cache R library
        uses: actions/cache@v4
        with:
          path: /root/R-libs
          key: r-libs-fedora-gcc16-${{ hashFiles('DESCRIPTION', '.github/workflows/fedora-cran-check.yaml') }}
          restore-keys: |
            r-libs-fedora-gcc16-

      - name: Install R package dependencies
        run: |
          mkdir -p "$R_LIBS_USER"
          rm -rf "$R_LIBS_USER"/00LOCK*
          R -q -e '
            .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
            options(repos = c(
              sounkou = "https://sounkou-bioinfo.r-universe.dev",
              CRAN = "https://cloud.r-project.org"
            ))
            pkgs <- c("knitr", "rmarkdown", "roxygen2", "RsimdDispatch", "Rtinycc", "tinytest")
            need <- setdiff(pkgs,
              rownames(installed.packages(lib.loc = Sys.getenv("R_LIBS_USER"))))
            if (length(need)) install.packages(need, lib = Sys.getenv("R_LIBS_USER"))
            stopifnot(requireNamespace("rmarkdown", quietly = TRUE))
          '

      - name: R CMD build
        run: R CMD build .

      - name: R CMD check --as-cran
        run: |
          PKG=$(ls -t Rminibwa_*.tar.gz | head -n1)
          R CMD check --as-cran --no-manual "$PKG"

      - name: Upload check artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fedora-cran-check-results
          path: |
            Rminibwa.Rcheck/
            config.log
          if-no-files-found: ignore
